<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusFlow HUD - Pro Version</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="hud-container glass">
        
        <div class="left-panel">
            <div class="stats-panel glass-inner">
                <h3>Status Pet</h3>
                <div class="stat-bar"><label>Energi</label><div class="bar"><div id="energy-fill" class="fill green"></div></div><span id="energy-val">100%</span></div>
                <div class="stat-bar"><label>Mood</label><div class="bar"><div id="fun-fill" class="fill blue"></div></div><span id="fun-val">100%</span></div>
                <div class="stat-bar"><label>Kenyang</label><div class="bar"><div id="hunger-fill" class="fill orange"></div></div><span id="hunger-val">100%</span></div>
            </div>

            <div class="task-panel glass-inner mt-4">
                <h3>Target Hari Ini</h3>
                <ul id="task-list">
                    <li><label><input type="checkbox" onchange="completeTask(this)"> Review materi UUD NRI 1945</label></li>
                    <li><label><input type="checkbox" onchange="completeTask(this)"> Latihan Soal Fisika</label></li>
                    <li><label><input type="checkbox" onchange="completeTask(this)"> Rangkuman Sosiologi</label></li>
                </ul>
                <div class="add-task">
                    <input type="text" id="new-task" placeholder="Tambah tugas baru...">
                    <button onclick="addTask()">+</button>
                </div>
            </div>
        </div>

        <div class="center-panel">
            <div class="timer-panel glass-inner">
                <h1 id="timer-display">25:00</h1>
                <div class="timer-controls">
                    <button onclick="startTimer()" id="btn-start" class="btn-primary">Fokus</button>
                    <button onclick="resetTimer()" class="btn-danger">Batal</button>
                </div>
            </div>

            <div class="pet-area mt-4">
                <div class="pet" id="virtual-pet">
                    <div class="glasses" id="pet-glasses">
                        <div class="glass-lens"></div>
                        <div class="glass-lens"></div>
                    </div>
                    <div class="eye left"></div>
                    <div class="eye right"></div>
                    <div class="mouth" id="pet-mouth"></div>
                </div>
                <div class="pet-shadow"></div>
                <p id="pet-status-text" class="status-text">Siap Belajar!</p>
            </div>
        </div>

        <div class="right-panel chat-panel glass-inner">
            <h3>AI Companion</h3>
            <div id="chat-box" class="chat-box">
                <div class="msg ai"><b>Pet:</b> Halo! Ayo selesaikan targetmu hari ini!</div>
            </div>
            <div class="input-area">
                <input type="text" id="user-input" placeholder="Tulis sesuatu...">
                <button onclick="sendMessage()" class="btn-primary">Kirim</button>
            </div>
        </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
